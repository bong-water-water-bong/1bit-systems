<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>halo-ai voice — chat</title>
<link rel="stylesheet" href="voice.css">
</head>
<body>

<header>
  <div class="brand">halo-<span class="accent">voice</span></div>
  <div class="status" id="status">connecting…</div>
</header>

<main id="log" aria-live="polite"></main>

<footer>
  <button id="text-toggle" class="mode" type="button" title="Switch to text input">⌨</button>
  <button id="mic" class="mic" type="button" aria-label="Hold to speak">
    <span class="mic-ring"></span>
    <svg viewBox="0 0 24 24" width="56" height="56" aria-hidden="true">
      <path fill="currentColor" d="M12 3a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3zm7 9a7 7 0 0 1-14 0H3a9 9 0 0 0 8 8.94V23h2v-2.06A9 9 0 0 0 21 12h-2z"/>
    </svg>
  </button>
  <button id="stop" class="stop" type="button" aria-label="Stop" hidden>■</button>
</footer>

<dialog id="picker" class="picker">
  <form method="dialog">
    <h2>Pick your assistant</h2>
    <p class="picker-lede">Voice, accent, and personality. You can change any of it later.</p>

    <fieldset>
      <legend>Voice</legend>
      <label><input type="radio" name="gender" value="f" checked> she / her</label>
      <label><input type="radio" name="gender" value="m"> he / him</label>
      <label><input type="radio" name="gender" value="n"> neutral</label>
    </fieldset>

    <fieldset>
      <legend>Accent</legend>
      <label><input type="radio" name="accent" value="a" checked> American</label>
      <label><input type="radio" name="accent" value="b"> British</label>
    </fieldset>

    <fieldset>
      <legend>Personality</legend>
      <label><input type="radio" name="personality" value="warm" checked> Warm · conversational</label>
      <label><input type="radio" name="personality" value="formal"> Formal · precise</label>
      <label><input type="radio" name="personality" value="playful"> Playful · witty</label>
      <label><input type="radio" name="personality" value="concise"> Concise · terse</label>
      <label><input type="radio" name="personality" value="professor"> Professor · explains</label>
    </fieldset>

    <fieldset>
      <legend>Name</legend>
      <input type="text" name="assistant_name" value="Halo" maxlength="24" placeholder="Halo">
    </fieldset>

    <menu>
      <button type="submit" value="save" class="primary">Start</button>
    </menu>
  </form>
</dialog>

<form id="text-form" hidden>
  <input id="text-input" type="text" autocomplete="off" placeholder="Type a message…">
  <button type="submit">Send</button>
  <button id="text-back" type="button" aria-label="Back to voice">🎙</button>
</form>

<script src="app.js" defer></script>
</body>
</html>
