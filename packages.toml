# 1bit-systems package manifest. Consumed by `1bit install <component>`.
#
# Each [component.X] declares:
#   description — one line shown in `1bit install --list`
#   deps        — other components required first (resolved recursively)
#   build       — argv array; executed in workspace root; fail-fast
#   units       — systemd --user units enabled + started after build
#   check       — optional HTTP healthcheck; 2xx = installed OK

[component.core]
description = "1bit systems core — 1bit CLI + 1bit-helm desktop + landing page + voice/echo/mcp + npu userspace (lemond is the canonical inference server, installed out-of-tree from /home/bcloud/repos/lemonade/)"
deps        = ["voice", "echo", "mcp", "npu"]
build = [
    ["cargo", "install", "--path", "crates/1bit-cli",      "--force", "--quiet"],
    ["cargo", "install", "--path", "crates/1bit-helm",     "--force", "--quiet"],
    ["cargo", "install", "--path", "crates/1bit-landing",  "--force", "--quiet"],
]
units = [
    "1bit-halo-lemonade.service",
    "strix-landing.service",
]
check = "http://127.0.0.1:8180/v1/models"

[component.agents]
description = "17 specialist dispatcher (tokio bus, JSON-RPC over MCP) — alias for mcp"
deps        = ["mcp"]
build       = []
units       = []
check       = ""

# 1bit-voice — sentence-boundary TTS streaming CLI. Installs the binary to
# ~/.cargo/bin (via `cargo install`). No systemd unit; the binary is invoked
# on demand by `1bit say`, `1bit-echo`, and ad-hoc shell pipelines.
[component.voice]
description = "1bit-voice CLI — LLM SSE → TTS streaming pipeline (binary only, no unit)"
deps        = []
build = [
    ["cargo", "install", "--path", "crates/1bit-voice", "--force", "--quiet"],
]
units = []
check = ""

# 1bit-echo — persistent WebSocket voice server on 127.0.0.1:8085. Wraps
# 1bit-voice and ships Opus frames to browser clients.
[component.echo]
description = "1bit-echo — WebSocket voice server on :8085 (Opus frames, wraps 1bit-voice)"
deps        = ["voice"]
build = [
    ["cargo", "install", "--path", "crates/1bit-echo", "--force", "--quiet"],
]
units = ["strix-echo.service"]
check = ""

# 1bit-mcp — stdio JSON-RPC MCP bridge. Installed as a binary only; Claude
# Code / external MCP clients launch it on demand, no systemd unit.
[component.mcp]
description = "1bit-mcp — stdio MCP bridge over 1bit-agents registry (binary only, no unit)"
deps        = []
build = [
    ["cargo", "install", "--path", "crates/1bit-mcp", "--force", "--quiet"],
]
units = []
check = ""

# npu — XDNA 2 NPU userspace. Declares package intent (xrt +
# xrt-plugin-amdxdna from CachyOS `extra`) and drops the memlock
# limits.d file via the new substitute-aware files[] entry. The
# actual pacman call lives in install.sh; 1bit install itself only
# deploys the config file (absolute-path writes go through sudo tee).
# Operator must re-login for memlock=unlimited to take effect.
[component.npu]
description = "XDNA 2 NPU userspace (XRT + memlock + firmware)"
deps        = []
packages    = ["xrt", "xrt-plugin-amdxdna"]
build       = []
units       = []
files = [
    { src = "strixhalo/security/99-npu-memlock.conf.tmpl", dst = "/etc/security/limits.d/99-npu-memlock.conf", substitute = { USER = "$USER" } },
]
check = ""

# strix-cloudflared — Cloudflare Tunnel to api.1bit.systems.
# NOTE: installing this component ONLY copies the systemd unit + config
# template into place. The operator MUST run `cloudflared tunnel login` +
# `cloudflared tunnel create` + edit ~/.cloudflared/config.yml BEFORE
# enabling the unit. See strixhalo/cloudflared/config.yml.template header.
[component.tunnel]
description = "cloudflared tunnel for api.1bit.systems (copies unit + template; operator must auth first)"
deps        = []
build       = []
units       = []
files = [
    ["strixhalo/systemd/strix-cloudflared.service",  "systemd/user/strix-cloudflared.service"],
    ["strixhalo/cloudflared/config.yml.template",    "cloudflared/config.yml.template"],
]
check       = ""

[component.whisper-kokoro]
description = "Whisper STT + Kokoro TTS (external repos, systemd only)"
deps        = []
build       = []
units       = ["1bit-halo-whisper.service", "1bit-halo-kokoro.service"]
check       = "http://127.0.0.1:8083/health"

[component.sd]
description = "Stable Diffusion image gen (native HIP, stable-diffusion.cpp)"
deps        = []
build       = []
units       = ["1bit-halo-sd.service"]
check       = "http://127.0.0.1:8081/health"

[component.lemonade]
description = "lemonade-server — Python reference, OpenAI-compat frontend (legacy)"
deps        = []
build       = []
units       = ["1bit-halo-lemonade.service"]
check       = "http://127.0.0.1:8000/api/v0/models"

[component.bitnet-gen1]
description = "Gen-1 C++ bitnet_decode server (legacy /v1/*)"
deps        = []
build       = []
units       = ["1bit-halo-bitnet.service"]
check       = "http://127.0.0.1:8080/v1/models"

[component.landing]
description = "1bit systems landing page on :8190 (bundled in core — alias for back-compat)"
deps        = ["core"]
build       = []
units       = []
check       = "http://127.0.0.1:8190/_health"

[component.helm]
description = "1bit-helm egui desktop client (bundled in core — alias for back-compat)"
deps        = ["core"]
build       = []
units       = []
check       = ""

# Alias: `1bit install gaia` still works, points at the renamed helm component.
# The crate rename (halo-gaia → 1bit-helm, 2026-04-20) was a rebrand only;
# the component name survives as an alias for anyone with old shell history.
[component.gaia]
description = "alias for 1bit-helm (renamed 2026-04-20; was halo-gaia)"
deps        = ["helm"]
build       = []
units       = []
check       = ""

[component.burnin]
description = "Shadow-traffic burn-in: gen-1 :8080 vs gen-2 :8180, 72h parity log"
deps        = ["core", "bitnet-gen1"]
build       = []
units       = ["strix-burnin.service"]
check       = ""

[component.power]
description = "Ryzen APU power-profile CLI (shells out to FlyGoat/ryzenadj)"
deps        = ["core"]
build       = []
units       = []
check       = ""

# 1bit-ingest — curator-side CLI that prepares a FLAC corpus for RunPod
# training and packs a trained GGUF + catalog.toml into a .1bl container
# (see docs/wiki/1bl-container-spec.md). Binary only; no systemd unit,
# no network, no training — purely a local file-tool.
[component.ingest]
description = "1bit-ingest — prepare/pack/validate .1bl catalog containers (binary only, no unit)"
deps        = []
build = [
    ["cargo", "install", "--path", "crates/1bit-ingest", "--force", "--quiet"],
]
units = []
check = ""

# -----------------------------------------------------------------------------
# Media lanes — full-C++ stack: TTS + STT + image + video.
# All engines ship as sibling repos (1bit-tts.cpp, stable-diffusion.cpp,
# whisper.cpp). Models download on first install via `hf` CLI and are
# sha256-verified. Rule A — no Python in runtime, no containers.

[component.tts-engine]
description = "1bit-tts.cpp — Qwen3-TTS C++/ggml server on :8095 (OpenAI /v1/audio/speech)"
deps        = []
build = [
    ["cmake", "-S", "../1bit-tts.cpp", "-B", "../1bit-tts.cpp/build", "-DGGML_VULKAN=ON"],
    ["cmake", "--build", "../1bit-tts.cpp/build", "-j", "16", "--target", "qwen3-tts-server"],
    ["install", "-Dm755", "../1bit-tts.cpp/build/qwen3-tts-server", "~/.local/bin/1bit-tts-server"],
]
files = [
    ["strixhalo/systemd/1bit-tts.service", "systemd/user/1bit-tts.service"],
]
units = ["1bit-tts.service"]
check = "http://127.0.0.1:8095/v1/audio/voices"

[component.stt-engine]
description = "whisper.cpp — C++ server on :8190 (whisper-large-v3 Vulkan on sliger B580)"
deps        = []
build = []
files = [
    ["strixhalo/systemd/1bit-whisper.service", "systemd/user/1bit-whisper.service"],
]
units = ["1bit-whisper.service"]
check = "http://127.0.0.1:8190/"

[component.image-engine]
description = "stable-diffusion.cpp — SDXL + Wan native HIP server on :1234"
deps        = []
build = [
    ["cmake", "-S", "../stable-diffusion.cpp", "-B", "../stable-diffusion.cpp/build-hip",
     "-DSD_HIPBLAS=OFF", "-DSD_HIP=ON"],
    ["cmake", "--build", "../stable-diffusion.cpp/build-hip", "-j", "16", "--target", "sd-server"],
    ["install", "-Dm755", "../stable-diffusion.cpp/build-hip/bin/sd-server", "~/.local/bin/1bit-sd-server"],
]
files = [
    ["strixhalo/systemd/1bit-sd.service", "systemd/user/1bit-sd.service"],
]
units = ["1bit-sd.service"]
check = "http://127.0.0.1:1234/"

[component.video-engine]
description = "stable-diffusion.cpp shared with image — Wan 2.2 TI2V-5B native HIP"
deps        = ["image-engine"]
build       = []
units       = []
check       = ""

# 1bit-stream — .1bl catalog HTTP server on :8150. Serves lossy-tier
# catalogs open; gates lossless-tier on a JWT with tier=premium. No uploads,
# no payment wiring, no UI. Caddy in front does TLS + public exposure.
[component.stream-engine]
description = "1bit-stream — .1bl catalog HTTP server on :8150 (lossy open, lossless JWT-gated)"
deps        = []
build = [
    ["cargo", "install", "--path", "crates/1bit-stream", "--force", "--quiet"],
]
files = [
    ["strixhalo/systemd/1bit-stream.service", "systemd/user/1bit-stream.service"],
]
units = ["1bit-stream.service"]
check = "http://127.0.0.1:8150/v1/health"

[component.npu-engine]
description = "IRON + MLIR-AIE + Peano + libxrt — XDNA2 NPU authoring lane (ship-gate unlocked 2026-04-23)"
deps        = []
# IRON is compile-time only. The bitnet-aie kernel we author goes into a
# sibling repo; this component sets up the environment. Rule A holds at
# serve time: xclbin artifact + libxrt C++ at runtime, no Python.
build = [
    ["mkdir", "-p", "~/repos", "~/.venvs"],
    ["sh", "-c", "test -d ~/repos/IRON || git clone https://github.com/amd/IRON.git ~/repos/IRON"],
    ["sh", "-c", "test -d ~/.venvs/ironenv || python3 -m venv ~/.venvs/ironenv"],
    ["sh", "-c", "~/.venvs/ironenv/bin/pip install --upgrade pip --quiet"],
    ["sh", "-c", "cd ~/repos/IRON && ~/.venvs/ironenv/bin/pip install -r requirements.txt --quiet"],
    # pyxrt ships in the system Arch xrt package — symlink into the venv.
    ["sh", "-c", "ln -sf /usr/lib/python3.14/site-packages/pyxrt.cpython-314-x86_64-linux-gnu.so ~/.venvs/ironenv/lib/python3.14/site-packages/pyxrt.cpython-314-x86_64-linux-gnu.so"],
]
units = []
check = ""

# ---------------------------------------------------------------------------
# `1bit install all` — compound meta-target. Pulls every engine + every
# currently-buildable model in one shot. First-boot OOBE on a fresh box.

[component.all]
description = "Complete pack — LLM + TTS + STT + image + video + NPU + watchdog + power"
deps = [
    "core",
    "tts-engine",
    "stt-engine",
    "image-engine",
    "video-engine",
    "npu-engine",
    "power",
    "burnin",
]
build       = []
units       = []
check       = ""

# -----------------------------------------------------------------------------
# Model registry — instant-load weight slots. `1bit install <model>` resolves
# deps (pulls engine first), fetches the GGUF via `hf` CLI with atomic write
# + sha256 verify, symlinks into ~/.local/share/1bit/models/, then restarts
# the owning systemd unit so the new weights are live immediately.

[model.bitnet-2p4b]
description  = "BitNet-1.58 2.4B — our Run 5 sparse (2:4 N:M) retrain"
hf_repo      = "bong-water-water-bong/bitnet-2p4b-sparse"
hf_file      = "model-tq2_0.gguf"
size_mb      = 380
license      = "MIT"
requires     = ["core"]
sha256       = "PENDING-RUN5"

[model.qwen3-tts-0p6b-ternary]
description  = "Qwen3-TTS 0.6B Base ternary — our Run 6 QAT"
hf_repo      = "bong-water-water-bong/qwen3-tts-0p6b-ternary"
hf_file      = "model-tq2_0.gguf"
size_mb      = 180
license      = "Qwen-permissive"
requires     = ["tts-engine"]
sha256       = "PENDING-RUN6"

[model.qwen3-tts-0p6b-base]
description  = "Qwen3-TTS 0.6B Base Q8_0 — fallback / baseline"
hf_repo      = "khimaros/Qwen3-TTS-12Hz-0.6B-Base-GGUF"
hf_file      = "Qwen3-TTS-12Hz-0.6B-Base-Q8_0.gguf"
size_mb      = 650
license      = "Qwen-permissive"
requires     = ["tts-engine"]
sha256       = "UPSTREAM"

[model.qwen3-tts-tokenizer]
description  = "Qwen3-TTS tokenizer + vocoder (12 Hz, F16) — shared by all Qwen3-TTS GGUFs"
hf_repo      = "khimaros/Qwen3-TTS-Tokenizer-12Hz-GGUF"
hf_file      = "Qwen3-TTS-Tokenizer-12Hz-F16.gguf"
size_mb      = 180
license      = "Qwen-permissive"
requires     = ["tts-engine"]
sha256       = "UPSTREAM"

[model.whisper-large-v3]
description  = "Whisper large-v3 q5_0 — STT on sliger B580 Vulkan"
hf_repo      = "ggerganov/whisper.cpp"
hf_file      = "ggml-large-v3-q5_0.bin"
size_mb      = 1080
license      = "MIT"
requires     = ["stt-engine"]
sha256       = "UPSTREAM"

[model.sdxl-q8]
description  = "SDXL base 1.0 Q8 — image gen native HIP"
hf_repo      = "bong-water-water-bong/sdxl-gguf"
hf_file      = "sd_xl_base_1.0.Q8_0.gguf"
size_mb      = 6800
license      = "OpenRAIL-M"
requires     = ["image-engine"]
sha256       = "UPSTREAM"

[model.wan2-2-ti2v-5b]
description  = "Wan 2.2 TI2V 5B Q4_K_M — image-to-video native HIP (Apache-2.0)"
hf_repo      = "QuantStack/Wan2.2-TI2V-5B-GGUF"
hf_file      = "Wan2.2-TI2V-5B-Q4_K_M.gguf"
size_mb      = 3400
license      = "Apache-2.0"
requires     = ["video-engine"]
sha256       = "UPSTREAM"

# -----------------------------------------------------------------------------
# Upstream watch list — consumed by 1bit-watchdog. Each entry tracks a
# upstream repo or HuggingFace model. Dwell time = 24h (unless overridden)
# before our fork / our weights are bumped. Discord notification fires on
# every state transition (seen-new, soaked-clean, merged, test-failed).

[watch.qwen3-tts-cpp]
kind        = "github"
repo        = "khimaros/qwen3-tts.cpp"
branch      = "main"
soak_hours  = 24
merge_into  = "bong-water-water-bong/1bit-tts.cpp"
on_merge    = [["cmake", "--build", "../1bit-tts.cpp/build", "-j", "16"]]
notify      = "discord:halo-updates"

[watch.stable-diffusion-cpp]
kind        = "github"
repo        = "leejet/stable-diffusion.cpp"
branch      = "master"
soak_hours  = 24
merge_into  = "bong-water-water-bong/stable-diffusion.cpp"
on_merge    = [["cmake", "--build", "../stable-diffusion.cpp/build-hip", "-j", "16"]]
notify      = "discord:halo-updates"

[watch.whisper-cpp]
kind        = "github"
repo        = "ggerganov/whisper.cpp"
branch      = "master"
soak_hours  = 24
merge_into  = "bong-water-water-bong/whisper.cpp"
on_merge    = []
notify      = "discord:halo-updates"

[watch.ggml]
kind        = "github"
repo        = "ggml-org/ggml"
branch      = "master"
soak_hours  = 48  # extra dwell — ggml churn is high
merge_into  = ""  # pin only; update via our engines' submodules
on_merge    = []
notify      = "discord:halo-updates"

[watch.ec-su-axb35]
kind        = "github"
repo        = "cmetz/ec-su_axb35-linux"
branch      = "main"
soak_hours  = 24
merge_into  = "bong-water-water-bong/ec-su_axb35-linux"
on_merge    = [["make", "-C", "../ec-su_axb35-linux", "all"],
               ["sudo", "make", "-C", "../ec-su_axb35-linux", "install"]]
notify      = "discord:halo-updates"

[watch.wan-ti2v-5b-weights]
kind        = "huggingface"
repo        = "Wan-AI/Wan2.2-TI2V-5B"
soak_hours  = 24
on_bump     = [["ssh", "runpod", "requantize-wan"]]
notify      = "discord:halo-updates"

[watch.qwen3-tts-upstream-weights]
kind        = "huggingface"
repo        = "Qwen/Qwen3-TTS-12Hz-0.6B-Base"
soak_hours  = 24
on_bump     = [["ssh", "runpod", "requantize-qwen3-tts"]]
notify      = "discord:halo-updates"
