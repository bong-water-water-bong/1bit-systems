# strix-ai-rs package manifest. Consumed by `halo install <component>`.
#
# Each [component.X] declares:
#   description — one line shown in `halo install --list`
#   deps        — other components required first (resolved recursively)
#   build       — argv array; executed in workspace root; fail-fast
#   units       — systemd --user units enabled + started after build
#   check       — optional HTTP healthcheck; 2xx = installed OK

[component.core]
description = "halo-ai core — halo CLI + halo-server + halo-lemonade gateway + halo-gaia TUI + landing page + voice/echo/mcp"
deps        = ["voice", "echo", "mcp"]
build = [
    ["cargo", "install", "--path", "crates/halo-cli",      "--force", "--quiet"],
    ["cargo", "install", "--path", "crates/halo-server",   "--force", "--quiet",
     "--features", "real-backend"],
    ["cargo", "install", "--path", "crates/halo-lemonade", "--force", "--quiet"],
    ["cargo", "install", "--path", "crates/halo-gaia",     "--force", "--quiet"],
    ["cargo", "install", "--path", "crates/halo-landing",  "--force", "--quiet"],
]
units = [
    "strix-server.service",
    "strix-lemonade.service",
    "strix-landing.service",
]
check = "http://127.0.0.1:8180/v1/models"

[component.agents]
description = "17 specialist dispatcher (tokio bus, JSON-RPC over MCP) — alias for mcp"
deps        = ["mcp"]
build       = []
units       = []
check       = ""

# halo-voice — sentence-boundary TTS streaming CLI. Installs the binary to
# ~/.cargo/bin (via `cargo install`). No systemd unit; the binary is invoked
# on demand by `halo say`, `halo-echo`, and ad-hoc shell pipelines.
[component.voice]
description = "halo-voice CLI — LLM SSE → TTS streaming pipeline (binary only, no unit)"
deps        = []
build = [
    ["cargo", "install", "--path", "crates/halo-voice", "--force", "--quiet"],
]
units = []
check = ""

# halo-echo — persistent WebSocket voice server on 127.0.0.1:8085. Wraps
# halo-voice and ships Opus frames to browser clients.
[component.echo]
description = "halo-echo — WebSocket voice server on :8085 (Opus frames, wraps halo-voice)"
deps        = ["voice"]
build = [
    ["cargo", "install", "--path", "crates/halo-echo", "--force", "--quiet"],
]
units = ["strix-echo.service"]
check = ""

# halo-mcp — stdio JSON-RPC MCP bridge. Installed as a binary only; Claude
# Code / external MCP clients launch it on demand, no systemd unit.
[component.mcp]
description = "halo-mcp — stdio MCP bridge over halo-agents registry (binary only, no unit)"
deps        = []
build = [
    ["cargo", "install", "--path", "crates/halo-mcp", "--force", "--quiet"],
]
units = []
check = ""

# strix-cloudflared — Cloudflare Tunnel to api.halo-ai.studio.
# NOTE: installing this component ONLY copies the systemd unit + config
# template into place. The operator MUST run `cloudflared tunnel login` +
# `cloudflared tunnel create` + edit ~/.cloudflared/config.yml BEFORE
# enabling the unit. See strixhalo/cloudflared/config.yml.template header.
[component.tunnel]
description = "cloudflared tunnel for api.halo-ai.studio (copies unit + template; operator must auth first)"
deps        = []
build       = []
units       = []
files = [
    ["strixhalo/systemd/strix-cloudflared.service",  "systemd/user/strix-cloudflared.service"],
    ["strixhalo/cloudflared/config.yml.template",    "cloudflared/config.yml.template"],
]
check       = ""

[component.whisper-kokoro]
description = "Whisper STT + Kokoro TTS (external repos, systemd only)"
deps        = []
build       = []
units       = ["halo-whisper.service", "halo-kokoro.service"]
check       = "http://127.0.0.1:8083/health"

[component.sd]
description = "Stable Diffusion image gen (native HIP, stable-diffusion.cpp)"
deps        = []
build       = []
units       = ["halo-sd.service"]
check       = "http://127.0.0.1:8081/health"

[component.lemonade]
description = "lemonade-server — Python reference, OpenAI-compat frontend (legacy)"
deps        = []
build       = []
units       = ["halo-lemonade.service"]
check       = "http://127.0.0.1:8000/api/v0/models"

[component.lemonade-rs]
description = "halo-lemonade — OpenAI + Lemonade-SDK compat gateway on :8200 (bundled in core)"
deps        = ["core"]
build       = []
units       = []
check       = "http://127.0.0.1:8200/_health"

[component.bitnet-gen1]
description = "Gen-1 C++ bitnet_decode server (legacy /v1/*)"
deps        = []
build       = []
units       = ["halo-bitnet.service"]
check       = "http://127.0.0.1:8080/v1/models"

[component.landing]
description = "halo-ai landing page on :8190 (bundled in core — alias for back-compat)"
deps        = ["core"]
build       = []
units       = []
check       = "http://127.0.0.1:8190/_health"

[component.gaia]
description = "halo-gaia terminal chat client (bundled in core — alias for back-compat)"
deps        = ["core"]
build       = []
units       = []
check       = ""

[component.burnin]
description = "Shadow-traffic burn-in: gen-1 :8080 vs gen-2 :8180, 72h parity log"
deps        = ["core", "bitnet-gen1"]
build       = []
units       = ["strix-burnin.service"]
check       = ""

[component.power]
description = "Ryzen APU power-profile CLI (shells out to FlyGoat/ryzenadj)"
deps        = ["core"]
build       = []
units       = []
check       = ""
