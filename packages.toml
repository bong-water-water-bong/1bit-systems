# strix-ai-rs package manifest. Consumed by `halo install <component>`.
#
# Each [component.X] declares:
#   description — one line shown in `halo install --list`
#   deps        — other components required first (resolved recursively)
#   build       — argv array; executed in workspace root; fail-fast
#   units       — systemd --user units enabled + started after build
#   check       — optional HTTP healthcheck; 2xx = installed OK

[component.core]
description = "1bit systems core — halo CLI + 1bit-server + 1bit-lemonade gateway + 1bit-helm desktop + landing page + voice/echo/mcp + npu userspace"
deps        = ["voice", "echo", "mcp", "npu"]
build = [
    ["cargo", "install", "--path", "crates/1bit-cli",      "--force", "--quiet"],
    ["cargo", "install", "--path", "crates/1bit-server",   "--force", "--quiet",
     "--features", "real-backend"],
    ["cargo", "install", "--path", "crates/1bit-lemonade", "--force", "--quiet"],
    ["cargo", "install", "--path", "crates/1bit-helm",     "--force", "--quiet"],
    ["cargo", "install", "--path", "crates/1bit-landing",  "--force", "--quiet"],
]
units = [
    "strix-server.service",
    "strix-lemonade.service",
    "strix-landing.service",
]
check = "http://127.0.0.1:8180/v1/models"

[component.agents]
description = "17 specialist dispatcher (tokio bus, JSON-RPC over MCP) — alias for mcp"
deps        = ["mcp"]
build       = []
units       = []
check       = ""

# 1bit-voice — sentence-boundary TTS streaming CLI. Installs the binary to
# ~/.cargo/bin (via `cargo install`). No systemd unit; the binary is invoked
# on demand by `halo say`, `1bit-echo`, and ad-hoc shell pipelines.
[component.voice]
description = "1bit-voice CLI — LLM SSE → TTS streaming pipeline (binary only, no unit)"
deps        = []
build = [
    ["cargo", "install", "--path", "crates/1bit-voice", "--force", "--quiet"],
]
units = []
check = ""

# 1bit-echo — persistent WebSocket voice server on 127.0.0.1:8085. Wraps
# 1bit-voice and ships Opus frames to browser clients.
[component.echo]
description = "1bit-echo — WebSocket voice server on :8085 (Opus frames, wraps 1bit-voice)"
deps        = ["voice"]
build = [
    ["cargo", "install", "--path", "crates/1bit-echo", "--force", "--quiet"],
]
units = ["strix-echo.service"]
check = ""

# 1bit-mcp — stdio JSON-RPC MCP bridge. Installed as a binary only; Claude
# Code / external MCP clients launch it on demand, no systemd unit.
[component.mcp]
description = "1bit-mcp — stdio MCP bridge over 1bit-agents registry (binary only, no unit)"
deps        = []
build = [
    ["cargo", "install", "--path", "crates/1bit-mcp", "--force", "--quiet"],
]
units = []
check = ""

# npu — XDNA 2 NPU userspace. Declares package intent (xrt +
# xrt-plugin-amdxdna from CachyOS `extra`) and drops the memlock
# limits.d file via the new substitute-aware files[] entry. The
# actual pacman call lives in install.sh; halo install itself only
# deploys the config file (absolute-path writes go through sudo tee).
# Operator must re-login for memlock=unlimited to take effect.
[component.npu]
description = "XDNA 2 NPU userspace (XRT + memlock + firmware)"
deps        = []
packages    = ["xrt", "xrt-plugin-amdxdna"]
build       = []
units       = []
files = [
    { src = "strixhalo/security/99-npu-memlock.conf.tmpl", dst = "/etc/security/limits.d/99-npu-memlock.conf", substitute = { USER = "$USER" } },
]
check = ""

# strix-cloudflared — Cloudflare Tunnel to api.1bit.systems.
# NOTE: installing this component ONLY copies the systemd unit + config
# template into place. The operator MUST run `cloudflared tunnel login` +
# `cloudflared tunnel create` + edit ~/.cloudflared/config.yml BEFORE
# enabling the unit. See strixhalo/cloudflared/config.yml.template header.
[component.tunnel]
description = "cloudflared tunnel for api.1bit.systems (copies unit + template; operator must auth first)"
deps        = []
build       = []
units       = []
files = [
    ["strixhalo/systemd/strix-cloudflared.service",  "systemd/user/strix-cloudflared.service"],
    ["strixhalo/cloudflared/config.yml.template",    "cloudflared/config.yml.template"],
]
check       = ""

[component.whisper-kokoro]
description = "Whisper STT + Kokoro TTS (external repos, systemd only)"
deps        = []
build       = []
units       = ["1bit-whisper.service", "halo-kokoro.service"]
check       = "http://127.0.0.1:8083/health"

[component.sd]
description = "Stable Diffusion image gen (native HIP, stable-diffusion.cpp)"
deps        = []
build       = []
units       = ["halo-sd.service"]
check       = "http://127.0.0.1:8081/health"

[component.lemonade]
description = "lemonade-server — Python reference, OpenAI-compat frontend (legacy)"
deps        = []
build       = []
units       = ["1bit-lemonade.service"]
check       = "http://127.0.0.1:8000/api/v0/models"

[component.lemonade-rs]
description = "1bit-lemonade — OpenAI + Lemonade-SDK compat gateway on :8200 (bundled in core)"
deps        = ["core"]
build       = []
units       = []
check       = "http://127.0.0.1:8200/_health"

[component.bitnet-gen1]
description = "Gen-1 C++ bitnet_decode server (legacy /v1/*)"
deps        = []
build       = []
units       = ["halo-bitnet.service"]
check       = "http://127.0.0.1:8080/v1/models"

[component.landing]
description = "1bit systems landing page on :8190 (bundled in core — alias for back-compat)"
deps        = ["core"]
build       = []
units       = []
check       = "http://127.0.0.1:8190/_health"

[component.helm]
description = "1bit-helm egui desktop client (bundled in core — alias for back-compat)"
deps        = ["core"]
build       = []
units       = []
check       = ""

# Alias: `halo install gaia` still works, points at the renamed helm component.
# The crate rename (halo-gaia → 1bit-helm, 2026-04-20) was a rebrand only;
# the component name survives as an alias for anyone with old shell history.
[component.gaia]
description = "alias for 1bit-helm (renamed 2026-04-20; was halo-gaia)"
deps        = ["helm"]
build       = []
units       = []
check       = ""

[component.burnin]
description = "Shadow-traffic burn-in: gen-1 :8080 vs gen-2 :8180, 72h parity log"
deps        = ["core", "bitnet-gen1"]
build       = []
units       = ["strix-burnin.service"]
check       = ""

[component.power]
description = "Ryzen APU power-profile CLI (shells out to FlyGoat/ryzenadj)"
deps        = ["core"]
build       = []
units       = []
check       = ""
