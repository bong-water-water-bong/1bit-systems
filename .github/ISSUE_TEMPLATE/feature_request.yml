name: Feature request
description: Propose a new capability or behavior change.
title: "feat: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing, please check the [roadmap in the README](../../README.md#roadmap)
        and the [wiki decision pages](../../docs/wiki/Home.md) — the answer
        to "why doesn't 1bit-systems X yet?" is often already written up
        under `docs/wiki/Why-*.md`.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: What does the current stack force you to do that feels wrong?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed capability
      description: Concrete, not abstract. "Add `/v1/embeddings`" is a feature; "make it better at RAG" is not.
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Which layer would this touch?
      options:
        - Rust crate (above the kernels)
        - HIP kernel (rocm-cpp)
        - HTTP / Caddy / systemd layer
        - CLI / desktop client
        - Docs / wiki / website
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What else did you try or think about? Why isn't that enough?

  - type: textarea
    id: rule-a
    attributes:
      label: Rule A check
      description: |
        Rule A: no Python at runtime. Does this proposal keep the
        runtime path Python-free? If it needs a new caller-side Python
        component, say so — that's fine, just be explicit.

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow the [Code of Conduct](../../CODE_OF_CONDUCT.md).
          required: true
