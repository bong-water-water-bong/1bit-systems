name: Bug report
description: Report a defect in 1bit-systems.
title: "bug: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug.

        Before submitting, please check that your issue isn't already
        covered in [existing issues](https://github.com/bong-water-water-bong/1bit-systems/issues)
        or in the [FAQ](../../docs/wiki/FAQ.md).

        For **security vulnerabilities**, do NOT file a public issue — use
        [private vulnerability reporting](https://github.com/bong-water-water-bong/1bit-systems/security/advisories/new)
        instead.

  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `halo version` (or the commit SHA if building from source).
      placeholder: "e.g. 0.1.0-dev (abc1234)"
    validations:
      required: true

  - type: dropdown
    id: backend
    attributes:
      label: Backend
      description: Which backend feature was enabled?
      options:
        - default (NullBackend, no GPU)
        - real-backend (HipBackend, gfx1151)
        - mlx-apple (MlxBackend, Apple Silicon)
    validations:
      required: true

  - type: input
    id: platform
    attributes:
      label: Platform
      description: OS + kernel + GPU (or Apple SoC).
      placeholder: "e.g. CachyOS 6.18.22-lts / Radeon 8060S gfx1151"
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Shortest sequence of commands that demonstrates the bug.
      render: shell
      placeholder: |
        cargo run --release -p 1bit-server --features real-backend
        curl -s http://127.0.0.1:8180/v1/chat/completions -d '...'
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include error messages and full logs where possible.
      render: shell
    validations:
      required: true

  - type: textarea
    id: doctor
    attributes:
      label: "`halo doctor` output"
      description: Paste the output of `halo doctor`. It collects kernel / ROCm / service state in one shot.
      render: shell
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: "`journalctl --user -u 1bit-server -n 200` or similar. Redact any bearers."
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our [Code of Conduct](../../CODE_OF_CONDUCT.md).
      options:
        - label: I agree to follow the Code of Conduct.
          required: true
