name: packaging

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: packaging-${{ github.ref }}
  cancel-in-progress: true

jobs:
  appimage:
    name: AppImage (Ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: Install rust 1.88
        run: |
          rustup install 1.88
          rustup default 1.88
      - name: Install appimage tools + build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 file libdbus-1-dev pkg-config
      - name: Build AppImage
        run: bash packaging/appimage/build-appimage.sh
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 1bit-systems-appimage
          path: packaging/appimage/dist/*.AppImage
          if-no-files-found: error

  flatpak:
    name: Flatpak (Ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    container:
      image: bilelmoussaoui/flatpak-github-actions:freedesktop-24.08
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: 1bit-systems.flatpak
          manifest-path: packaging/flatpak/io.onebit.Systems.yml
          cache-key: flatpak-builder-${{ github.sha }}

  homebrew:
    name: Homebrew formula lint
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install Homebrew if missing
        run: |
          if ! command -v brew >/dev/null; then
            /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          fi
      - name: Audit formula
        run: |
          brew ruby -e "require 'formula'; load '#{ENV['GITHUB_WORKSPACE']}/packaging/homebrew/onebit-systems.rb'; puts OnebitSystems.name"
      - name: Style check
        run: |
          brew style packaging/homebrew/onebit-systems.rb || echo "style warnings (non-fatal on formula scaffold)"

  docker:
    name: Docker image (Ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image (verify only, no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packaging/docker/Dockerfile
          push: false
          load: true
          tags: 1bit-systems:0.1.8-ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Inspect built image
        run: |
          docker image ls 1bit-systems:0.1.8-ci
          docker image inspect 1bit-systems:0.1.8-ci \
            --format '{{json .Config.Labels}}'

  snap:
    name: Snap package (Ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Build snap
        id: build
        uses: snapcore/action-build@v1
        with:
          path: packaging/snap
      - name: Upload .snap artifact
        uses: actions/upload-artifact@v4
        with:
          name: 1bit-systems-snap
          path: ${{ steps.build.outputs.snap }}
          if-no-files-found: error
