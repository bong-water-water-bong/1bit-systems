name: deploy-pages

# Cloudflare Pages auto-deploy. The `1bit-systems` Pages project was
# created as a Direct Uploads project, which blocks the native Git-source
# connection (CF API error 8000069). This workflow gets the same effect:
# every push to main runs `wrangler pages deploy` against the project,
# using a CF API token stored as a repo secret.
#
# Only runs when 1bit-site/ changes — saves CI minutes on cpp/-only commits.

on:
  push:
    branches: [main]
    paths:
      - '1bit-site/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

concurrency:
  group: deploy-pages
  cancel-in-progress: false

jobs:
  deploy:
    name: wrangler pages deploy
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Deploy 1bit-site to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npx --yes wrangler@4 pages deploy 1bit-site \
            --project-name=1bit-systems \
            --branch=main \
            --commit-dirty=true \
            --commit-hash="${GITHUB_SHA}" \
            --commit-message="${GITHUB_SHA::8} via gh actions"
