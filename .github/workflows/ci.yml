name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: cargo test (default features, no GPU)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (libdbus for ksni tray)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config

      - name: Install Rust 1.88
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: cargo build (default features)
        run: cargo build --workspace --release --locked

      - name: cargo test (default features)
        run: cargo test --workspace --release --locked

  clippy:
    name: cargo clippy (-D warnings, no GPU crates)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (libdbus for ksni tray)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config

      - name: Install Rust 1.88
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
          components: clippy

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      # onebit-hip requires ROCm headers (no ROCm on ubuntu-latest).
      # onebit-mlx is Apple Silicon only.
      # Package names use the underscore-prefixed form (cargo rejects
      # digit-leading names); filesystem + bin names keep the 1bit- brand.
      # uninlined-format-args stays a warning — bulk-fixing it is disruptive
      # and not load-bearing for correctness.
      - name: cargo clippy (-D warnings)
        run: >
          cargo clippy
          --workspace
          --exclude onebit-hip
          --exclude onebit-mlx
          --release
          --all-targets
          --no-deps
          --locked
          --
          -D warnings
          -A clippy::uninlined-format-args

  install-sh:
    name: install.sh syntax + CI-mode dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: bash -n install.sh
        run: bash -n install.sh

      - name: Install system deps (libdbus for ksni tray)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config

      - name: Install Rust 1.88
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"

      - name: CI=1 ./install.sh (no ROCm, cargo check only)
        env:
          CI: "1"
        run: ./install.sh

  build-appimage:
    name: build-appimage (non-blocking)
    runs-on: ubuntu-latest
    # Non-blocking while the release flow / signing is wired up. Flip to
    # `continue-on-error: false` after first green run lands an artifact
    # users can actually download.
    continue-on-error: true
    # Fork PRs don't need AppImage publishing — skip to avoid burning CI
    # minutes on untrusted code. Runs on push/PR from the main repo.
    if: github.event.pull_request.head.repo.fork != true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.88
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install AppImage host deps (FUSE + ImageMagick + libdbus)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              libfuse2 imagemagick fonts-dejavu-core \
              libdbus-1-dev pkg-config

      - name: Build AppImage
        run: packaging/appimage/build-appimage.sh

      - name: List artifact
        run: |
          ls -lh packaging/appimage/dist/
          cat packaging/appimage/dist/*.sha256

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: 1bit-systems-appimage-x86_64
          path: |
            packaging/appimage/dist/*.AppImage
            packaging/appimage/dist/*.sha256
          if-no-files-found: error
          retention-days: 14
