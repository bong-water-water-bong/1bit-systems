name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: cargo test (default features, no GPU)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.86
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.86"

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: cargo build (default features)
        run: cargo build --workspace --release

      - name: cargo test (default features)
        run: cargo test --workspace --release

  clippy:
    name: cargo clippy (-D warnings, no GPU crates)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.86
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.86"
          components: clippy

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      # 1bit-hip requires ROCm headers (no ROCm on ubuntu-latest).
      # 1bit-mlx is Apple Silicon only.
      # uninlined-format-args stays a warning — bulk-fixing it is disruptive
      # and not load-bearing for correctness.
      - name: cargo clippy (-D warnings)
        run: >
          cargo clippy
          --workspace
          --exclude 1bit-hip
          --exclude 1bit-mlx
          --release
          --all-targets
          --no-deps
          --
          -D warnings
          -A clippy::uninlined-format-args

  install-sh:
    name: install.sh syntax + CI-mode dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: bash -n install.sh
        run: bash -n install.sh

      - name: Install Rust 1.86
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.86"

      - name: CI=1 ./install.sh (no ROCm, cargo check only)
        env:
          CI: "1"
        run: ./install.sh
