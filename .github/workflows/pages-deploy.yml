name: pages-deploy

# Push 1bit-site/ to Cloudflare Pages on every main commit that touches
# the site directory. Project is direct-upload (not git-connected on the
# CF side), so without this workflow no deploy happens.

on:
  push:
    branches: [main]
    paths:
      - '1bit-site/**'
      - '.github/workflows/pages-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: deploy 1bit-site to cloudflare pages
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: install wrangler
        run: npm install -g wrangler@4

      - name: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd 1bit-site
          wrangler pages deploy . \
            --project-name 1bit-systems \
            --branch main \
            --commit-hash "$GITHUB_SHA" \
            --commit-dirty=false
