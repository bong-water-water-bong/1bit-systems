[package]
name         = "gguf-to-h1b"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
repository.workspace   = true
authors.workspace      = true
description  = "gguf-to-h1b — frame a PrismML Bonsai GGUF (Q1_0_g128 / TQ2_0_g128) into a .h1b v2 file with the Bonsai flag bits set."

[[bin]]
name = "gguf-to-h1b"
path = "src/main.rs"

[lib]
name = "gguf_to_h1b"
path = "src/lib.rs"

[dependencies]
# Reuse onebit-core's existing GGUF parser + h1b writer — no new heavy
# dependency chain (no candle, no gguf-rs). This keeps the tool under
# ~400 LOC and inherits every bugfix landed on the main GGUF parser.
onebit-core = { workspace = true }
clap        = { workspace = true }
anyhow      = { workspace = true }
thiserror   = { workspace = true }
byteorder   = { workspace = true }

[dev-dependencies]
tempfile = "3"
