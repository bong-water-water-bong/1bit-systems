[package]
name         = "bitnet-to-tq2"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
repository.workspace   = true
authors.workspace      = true
description  = "bitnet-to-tq2 — repack microsoft/bitnet-b1.58-2B-4T bf16 master weights into a .h1b v4 file using PrismML's TQ2_0_g128 block layout."

[[bin]]
name = "bitnet-to-tq2"
path = "src/main.rs"

[lib]
name = "bitnet_to_tq2"
path = "src/lib.rs"

[dependencies]
# Shared flag / magic constants. We deliberately avoid `onebit-core::h1b::serialize`
# because the Bonsai layout here is a thin "header + per-tensor blob" stream
# rather than the fully-normalized BitNet serializer shape.
onebit-core = { workspace = true }
clap        = { workspace = true }
anyhow      = { workspace = true }
thiserror   = { workspace = true }
half        = { workspace = true }
byteorder   = { workspace = true }
memmap2     = { workspace = true }
# Pin to the latest 0.x — safetensors' API is stable across 0.5..0.7 and
# 0.7 is the currently-published crate (2026 release line).
safetensors = "0.7"
serde_json  = { workspace = true }

[dev-dependencies]
tempfile = "3"
