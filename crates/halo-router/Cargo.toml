[package]
name         = "halo-router"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
repository.workspace   = true
authors.workspace      = true
description  = "halo-router — backend dispatcher (picks halo-bitnet-hip vs halo-bitnet-mlx)"

[lib]
path = "src/lib.rs"

[features]
# Default: the router compiles without linking any GPU kernels (CI / check
# friendly). Turn on `hip` to link halo-bitnet-hip's rocm-cpp kernels.
#
# `real-xdna` flips halo-bitnet-xdna out of stub mode into real libxrt
# linkage. Off by default so `cargo build --workspace` stays green on
# hosts without libxrt installed. Turn it on once Peano lands a working
# xclbin — the Xdna backend arm in forward() will start actually dispatching
# rather than returning the NotYetWired stub error.
default    = []
hip        = ["halo-bitnet-hip/link-rocm"]
real-xdna  = ["halo-bitnet-xdna/real-xrt"]

[dependencies]
anyhow  = { workspace = true }
tokio   = { workspace = true }
tracing = { workspace = true }
thiserror = { workspace = true }
futures   = { workspace = true }
async-stream = { workspace = true }
tokio-stream = { workspace = true }
half      = { workspace = true }
# Rayon is the CPU lane's thread pool — see `src/cpu_lane.rs`. Pinned to
# the 1.x family; rayon is transitively present in the workspace already
# (via tokenizers + hf-tokenizers in other crates) so adding it here
# doesn't grow the build graph. Not a workspace dep today — if another
# crate needs it we'll promote it then.
rayon     = "1"

halo-core        = { workspace = true }
halo-bitnet-hip  = { path = "../halo-bitnet-hip", default-features = false }
# XDNA 2 NPU FFI crate. Default-features off + explicit stub so CI hosts
# without libxrt still build. Flipping halo-router's own `real-xdna`
# feature on propagates to halo-bitnet-xdna/real-xrt.
halo-bitnet-xdna = { path = "../halo-bitnet-xdna", default-features = false, features = ["stub"] }
