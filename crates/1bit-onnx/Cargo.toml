[package]
name          = "onebit-onnx"
version       = { workspace = true }
edition       = { workspace = true }
rust-version  = { workspace = true }
license       = { workspace = true }
repository    = { workspace = true }
authors       = { workspace = true }
description   = "ONNX Runtime lane for 1bit-systems — loads MatMulNBits .onnx artifacts (e.g. TriLM int4). CPU EP today, VitisAI EP feature-gated for XDNA2 NPU day."

[features]
default = ["cpu"]
# Enable CPU execution provider (always available, portable).
cpu = []
# Enable VitisAI execution provider. Requires AMD Ryzen AI 1.7+ Linux STX-H EP
# to be installed and LD_LIBRARY_PATH-visible at session creation. Flag exists
# so the crate compiles without the EP on CI hosts; library-load failures at
# runtime surface as `OnnxError::VitisaiUnavailable`, not panics.
vitisai = []

[dependencies]
ort          = { version = "=2.0.0-rc.12", default-features = false, features = ["load-dynamic", "std", "ndarray", "tracing", "api-24"] }
tokenizers   = { version = "0.22", default-features = false, features = ["onig"] }
ndarray      = "0.17"

# Shared workspace deps.
serde        = { workspace = true }
serde_json   = { workspace = true }
anyhow       = { workspace = true }
thiserror    = { workspace = true }
tracing      = { workspace = true }
half         = { workspace = true }

[dev-dependencies]
tempfile     = "3"
