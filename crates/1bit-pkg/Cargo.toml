[package]
name         = "onebit-pkg"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
repository.workspace   = true
authors.workspace      = true
description  = "1bit-halo-pkg — plugin package manager for Helm. Installs/lists/removes MCP-server / skill / weights plugins under ~/.local/share/1bit-halo-pkg/. See docs/wiki/Helm-Plugin-API.md (spec v0.1)."

[[bin]]
name = "1bit-halo-pkg"
path = "src/main.rs"

[lib]
name = "onebit_pkg"
path = "src/lib.rs"

[dependencies]
clap    = { workspace = true }
serde   = { workspace = true }
toml    = { workspace = true }
anyhow  = { workspace = true }
reqwest = { workspace = true }
sha2    = { workspace = true }
dirs    = { workspace = true }

[dev-dependencies]
tempfile = "3"
