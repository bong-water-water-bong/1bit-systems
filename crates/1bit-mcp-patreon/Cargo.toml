[package]
name         = "onebit-mcp-patreon"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
repository.workspace   = true
authors.workspace      = true
description  = "1bit-mcp-patreon — MCP stdio server exposing Patreon campaign/tiers/members/posts. Caller-side, Rule A compliant (pure Rust)."

[[bin]]
name = "1bit-mcp-patreon"
