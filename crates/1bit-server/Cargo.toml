[package]
name         = "onebit-server"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
repository.workspace   = true
authors.workspace      = true
description  = "1bit-server — OpenAI-compatible HTTP server for the 1bit systems stack (replaces bitnet_decode --server and lemonade-server)"

[lib]
name = "onebit_server"
path = "src/lib.rs"

[[bin]]
name = "onebit-server"
path = "src/main.rs"

[features]
# Default build ships only EchoBackend — keeps CI / unit tests independent
# of ROCm. Turn on `real-backend` to link 1bit-router + 1bit-hip
# against librocm_cpp.so.
default       = []
real-backend  = ["dep:onebit-router", "dep:onebit-core", "dep:onebit-hip"]

[dependencies]
tokio              = { workspace = true }
tracing            = { workspace = true }
tracing-subscriber = { workspace = true }
axum               = { workspace = true }
tower              = { workspace = true }
tower-http         = { workspace = true }
serde              = { workspace = true }
serde_json         = { workspace = true }
futures            = { workspace = true }
async-stream       = { workspace = true }
tokio-stream       = { workspace = true }
clap               = { workspace = true }
anyhow             = { workspace = true }
thiserror          = { workspace = true }
uuid               = { workspace = true }
libc               = { workspace = true }

# Real backend wiring — optional, enabled by `--features real-backend`.
onebit-router        = { path = "../1bit-router", features = ["hip"], optional = true }
onebit-core          = { path = "../1bit-core", optional = true }
onebit-hip    = { path = "../1bit-hip", optional = true }

[dev-dependencies]
reqwest            = { workspace = true }
