# /etc/halo-power/profiles.toml
#
# Power + thermal profiles for AMD Ryzen AI Max+ 395 "Strix Halo"
# (Radeon 8060S iGPU, 128 GB LPDDR5X-8000).
#
# Units:
#   *_limit    — RyzenAdj power knobs, in milliwatts.
#   *_current  — VRM current limits, in milliamps.
#   tctl_temp  — CPU Tctl target, in °C (AMD safe ceiling ~95).
#
# Reference points (stock cTDP window per AMD/OEM docs):
#   - nominal / config TDP : 55 W
#   - cTDP range           : 45 W (min) — 120 W (max sustained) — 140 W (peak)
#
# Tuning philosophy for this machine: it lives in a silent closet on
# LPDDR5X, so quiet/balanced stay under 90 °C. Boost/max let it stretch
# during prefill spikes but clamp Tctl at 95.

# "quiet" — closet idle / background inference. Fan audibly spun down.
# Long-run ~30 W, short-run ~45 W. Plenty for BitNet-1.58 decode.
[quiet]
stapm_limit        = 30000   # 30 W sustained
fast_limit         = 45000   # 45 W burst
slow_limit         = 38000
tctl_temp          = 85
vrm_current        = 60000
vrmmax_current     = 80000
vrmsoc_current     = 30000
vrmsocmax_current  = 40000

# "balanced" — the default on-boot profile. Matches AMD stock 55 W STAPM
# with a fast-PPT that lets 70B prefill finish without throttling.
[balanced]
stapm_limit        = 55000
fast_limit         = 80000
slow_limit         = 70000
tctl_temp          = 90
vrm_current        = 100000
vrmmax_current     = 140000
vrmsoc_current     = 50000
vrmsocmax_current  = 70000

# "boost" — foreground work, user is at the keyboard. Lifts STAPM to
# 90 W and fast-PPT to 120 W. Fan will be audible.
[boost]
stapm_limit        = 90000
fast_limit         = 120000
slow_limit         = 105000
tctl_temp          = 92
vrm_current        = 140000
vrmmax_current     = 180000
vrmsoc_current     = 70000
vrmsocmax_current  = 90000

# "max" — every watt the OEM VRM will pass. Reserved for benchmarking
# and short burst evals. Tctl pinned at 95 °C to trip before damage.
[max]
stapm_limit        = 120000
fast_limit         = 140000
slow_limit         = 130000
tctl_temp          = 95
vrm_current        = 180000
vrmmax_current     = 230000
vrmsoc_current     = 90000
vrmsocmax_current  = 110000
