[package]
name         = "onebit-power"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
repository.workspace   = true
authors.workspace      = true
description  = "1bit-power — Linux power/thermal control for AMD Strix Halo (Ryzen AI Max+ 395 / Radeon 8060S / 128 GB LPDDR5X). Wraps RyzenAdj via shellout or libryzenadj. Replaces the closed-source Windows tray RyzenZPilot."

[[bin]]
name = "halo-power"
path = "src/main.rs"

[features]
default    = ["shellout"]
# shellout: invoke `/usr/bin/ryzenadj` as a subprocess. Zero build-time
# deps, works on any box that has the upstream FlyGoat/RyzenAdj CLI
# installed. This is the default so the binary is immediately usable.
shellout   = []
# libryzenadj: dlopen `libryzenadj.so` and call the C API directly.
# Lower overhead per-set, but requires libryzenadj installed at runtime.
# Stubbed today; real wiring lands when we profile shellout overhead.
libryzenadj = ["dep:libloading"]

[dependencies]
clap              = { workspace = true }
serde             = { workspace = true }
serde_json        = { workspace = true }
toml              = { workspace = true }
anyhow            = { workspace = true }
thiserror         = { workspace = true }
tracing           = { workspace = true }
tracing-subscriber = { workspace = true }
libloading        = { version = "0.8", optional = true }

[dev-dependencies]
tempfile = "3"
