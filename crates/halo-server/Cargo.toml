[package]
name         = "halo-server"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
repository.workspace   = true
authors.workspace      = true
description  = "halo-server — OpenAI-compatible HTTP server for the halo-ai stack (replaces bitnet_decode --server and lemonade-server)"

[lib]
path = "src/lib.rs"

[[bin]]
name = "halo-server"
path = "src/main.rs"

[features]
# Default build ships only EchoBackend — keeps CI / unit tests independent
# of ROCm. Turn on `real-backend` to link halo-router + halo-bitnet-hip
# against librocm_cpp.so.
default       = []
real-backend  = ["dep:halo-router", "dep:halo-core", "dep:halo-bitnet-hip"]

[dependencies]
tokio              = { workspace = true }
tracing            = { workspace = true }
tracing-subscriber = { workspace = true }
axum               = { workspace = true }
tower              = { workspace = true }
tower-http         = { workspace = true }
serde              = { workspace = true }
serde_json         = { workspace = true }
futures            = { workspace = true }
async-stream       = { workspace = true }
tokio-stream       = { workspace = true }
clap               = { workspace = true }
anyhow             = { workspace = true }
thiserror          = { workspace = true }
uuid               = { workspace = true }

# Real backend wiring — optional, enabled by `--features real-backend`.
halo-router        = { path = "../halo-router", features = ["hip"], optional = true }
halo-core          = { path = "../halo-core", optional = true }
halo-bitnet-hip    = { path = "../halo-bitnet-hip", optional = true }

[dev-dependencies]
reqwest            = { workspace = true }
