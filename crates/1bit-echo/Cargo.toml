[package]
name         = "onebit-echo"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
repository.workspace   = true
authors.workspace      = true
description  = "1bit-echo — browser-side voice: wraps 1bit-voice and ships Opus packets (WAV today) over axum WebSocket."

[lib]
name = "onebit_echo"
path = "src/lib.rs"

[[bin]]
name = "onebit-echo"
path = "src/main.rs"

[dependencies]
anyhow     = { workspace = true }
axum       = { version = "0.7", features = ["macros", "json", "tokio", "ws"] }
tokio      = { workspace = true }
tokio-stream = { workspace = true }
futures    = { workspace = true }
serde      = { workspace = true }
serde_json = { workspace = true }
tracing    = { workspace = true }
tracing-subscriber = { workspace = true }
clap       = { workspace = true }
bytes      = { workspace = true }
onebit-voice = { path = "../1bit-voice" }
# Opus encoder. `audiopus` is the maintained safe binding to libopus.
audiopus   = { version = "0.2", default-features = false }

[dev-dependencies]
tokio-tungstenite = { version = "0.23", default-features = false, features = ["connect"] }
async-stream = { workspace = true }
