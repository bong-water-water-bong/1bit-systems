[package]
name         = "onebit-helm-tui"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
repository.workspace   = true
authors.workspace      = true
description  = "1bit-helm-tui — interactive tmux-style operator TUI for the 1bit stack"

[[bin]]
name = "1bit-helm-tui"
path = "src/main.rs"

[dependencies]
# TUI + terminal — ratatui handles widgets + layout, crossterm handles
# raw-mode + mouse + resize events under Linux TTY.
ratatui   = { version = "0.28", default-features = false, features = ["crossterm"] }
crossterm = "0.28"

# Async for the probe tasks (metrics poll, journalctl tail).
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "time", "sync", "fs", "process", "signal", "io-util"] }

# Errors + CLI.
anyhow    = { workspace = true }
thiserror = { workspace = true }
clap      = { workspace = true, features = ["derive"] }

# Layout persistence.
serde      = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }

# HTTP probes to 1bit-server /v1/models + 1bit-landing /metrics.
reqwest = { workspace = true, features = ["json", "rustls-tls"] }

# Logging infrastructure so the Logs pane has structured input.
tracing            = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter"] }
