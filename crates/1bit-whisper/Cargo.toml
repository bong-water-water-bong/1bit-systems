[package]
# Cargo package names cannot start with a digit. The filesystem / bin name
# keeps the `1bit-whisper` brand; the package / crate identifier is the
# underscore form.
name         = "onebit-whisper"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
repository.workspace   = true
authors.workspace      = true
description  = "1bit-whisper — FFI + safe Rust streaming surface over libwhisper (whisper.cpp 1.8.x)."

[lib]
name = "onebit_whisper"
path = "src/lib.rs"

[[bin]]
name = "1bit-whisper"
path = "src/main.rs"

[features]
# `stub` (default) keeps the crate pure-Rust: no C shim compiled, no link
# against libwhisper. Every engine method returns `WhisperError::UnsupportedStub`.
# CI hosts without whisper.cpp installed stay green.
#
# `real-whisper` flips on the build.rs shim compile + `-lwhisper` link step
# and swaps the stub for the libwhisper-backed implementation.
default       = ["stub"]
stub          = []
real-whisper  = []

# Signals to build.rs + downstream services that the system libwhisper was
# compiled with GGML_VULKAN=ON. Pure metadata — system whisper.cpp picks
# the backend at its own build time. On sliger (Intel Arc B580 / Xe2) this
# is the supported path; on strixhalo (gfx1151) we fall back to Vulkan or
# HIP per whisper.cpp install.
vulkan        = ["real-whisper"]
# Analogous signal for hipBLAS-free HIP backend (whisper.cpp GGML_HIPBLAS).
# Not used on the serving path today per Rule C; kept for parity.
hip           = ["real-whisper"]

[dependencies]
anyhow     = { workspace = true }
bytes      = { workspace = true }
tokio      = { workspace = true }
tracing    = { workspace = true }
serde      = { workspace = true }
# Bounded MPMC channel used by the streaming worker thread. Already in
# the workspace graph via `1bit-router`; tiny (~200 LOC, spin +
# pin-project-lite transitive deps already present via axum/tokio). We
# picked flume over crossbeam-channel for consistency with the sampler
# handoff pattern in 1bit-router (see its Cargo.toml comment).
flume      = "0.11"

[build-dependencies]
cc = "1.2"

[dev-dependencies]
serde_json = { workspace = true }
