[package]
name         = "onebit-mcp-clients"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
repository.workspace   = true
authors.workspace      = true
description  = "1bit-mcp-clients — outbound MCP client library. Stdio + streamable HTTP transports; thin wrappers for GitHub, Semgrep, and any JSON-RPC 2.0 MCP server."

[lib]
name = "onebit_mcp_clients"
path = "src/lib.rs"

[dependencies]
tokio       = { workspace = true }
serde       = { workspace = true }
serde_json  = { workspace = true }
tracing     = { workspace = true }
anyhow      = { workspace = true }
thiserror   = { workspace = true }
reqwest     = { workspace = true }

[dev-dependencies]
tokio = { workspace = true }
