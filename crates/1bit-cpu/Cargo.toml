[package]
name         = "onebit-cpu"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
repository.workspace   = true
authors.workspace      = true
description  = "1bit-cpu — FFI shim over the AVX2 ternary GEMV static lib in rocm-cpp/cpu-avx2/."

[lib]
name = "onebit_cpu"
path = "src/lib.rs"

[features]
# Default: skip linking. Like `1bit-hip`, the crate compiles as a stubs-only
# library so CI / cargo-check on hosts without libcpu_avx2_ternary.a keep
# working. Flip `link-cpu-avx2` on to wire against the real kernel.
default      = []
link-cpu-avx2 = []

[dependencies]
thiserror = { workspace = true }
tracing   = { workspace = true }
