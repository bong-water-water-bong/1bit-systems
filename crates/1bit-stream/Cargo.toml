[package]
name         = "onebit-stream"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
repository.workspace   = true
authors.workspace      = true
description  = "1bit-stream — .1bl catalog HTTP server. Lists catalogs, serves lossy-tier streams open, gates lossless-tier on a premium JWT claim. No uploads, no BTCPay, no UI — just the read side."

[[bin]]
name = "1bit-stream"
path = "src/main.rs"

[lib]
name = "onebit_stream"
path = "src/lib.rs"

[dependencies]
anyhow             = { workspace = true }
async-stream       = { workspace = true }
axum               = { workspace = true }
bytes              = { workspace = true }
clap               = { workspace = true }
dirs               = { workspace = true }
futures            = { workspace = true }
serde              = { workspace = true }
serde_json         = { workspace = true }
sha2               = { workspace = true }
thiserror          = { workspace = true }
tokio              = { workspace = true }
tower-http         = { workspace = true }
tracing            = { workspace = true }
tracing-subscriber = { workspace = true }

# Direct deps (no workspace alias): CBOR manifest decoder + HS256 JWT.
ciborium     = "0.2"
jsonwebtoken = "9"

[dev-dependencies]
reqwest = { workspace = true }
tempfile = "3"
