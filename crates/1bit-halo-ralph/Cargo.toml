[package]
name         = "onebit-ralph"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
repository.workspace   = true
authors.workspace      = true
description  = "1bit-halo-ralph — minimal ralph-loop agent. Points at any OpenAI-compatible endpoint (1bit-halo-server by default), runs a task prompt in a loop, optionally re-runs a test command each iteration and feeds its output back as context. Rule A safe (caller-side), zero Python."

[[bin]]
name = "1bit-halo-ralph"
path = "src/main.rs"

[dependencies]
tokio       = { workspace = true }
reqwest     = { workspace = true }
serde       = { workspace = true }
serde_json  = { workspace = true }
clap        = { workspace = true }
anyhow      = { workspace = true }
