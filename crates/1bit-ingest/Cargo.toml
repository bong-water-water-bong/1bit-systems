[package]
name         = "onebit-ingest"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
repository.workspace   = true
authors.workspace      = true
description  = "1bit-ingest — source-side CLI for catalog curators. Scans FLAC dirs into a RunPod-ready training corpus, then packs a trained GGUF + catalog.toml into a .1bl container (see docs/wiki/1bl-container-spec.md)."

[[bin]]
name = "1bit-ingest"
path = "src/main.rs"

[lib]
name = "onebit_ingest"
path = "src/lib.rs"

[dependencies]
anyhow     = { workspace = true }
clap       = { workspace = true }
serde      = { workspace = true }
serde_json = { workspace = true }
sha2       = { workspace = true }
toml       = { workspace = true }
byteorder  = { workspace = true }
thiserror  = { workspace = true }
walkdir    = "2"
tar        = "0.4"
ciborium   = "0.2"

[dev-dependencies]
tempfile = "3"
