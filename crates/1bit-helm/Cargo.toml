[package]
name         = "onebit-helm"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
repository.workspace   = true
authors.workspace      = true
description  = "1bit-helm — native Rust (egui/eframe) desktop client for 1bit-server. Formerly halo-gaia; renamed 2026-04-20 to avoid clash with AMD GAIA."

[lib]
name = "onebit_helm"
path = "src/lib.rs"

[[bin]]
name = "onebit-helm"
path = "src/main.rs"

[dependencies]
anyhow       = { workspace = true }
reqwest      = { workspace = true }
serde        = { workspace = true }
serde_json   = { workspace = true }
tokio        = { workspace = true }
futures      = { workspace = true }
async-stream = { workspace = true }

# 1bit-agents for SkillStore + MemoryStore reads (Skills / Memory panes).
onebit-agents  = { workspace = true }

# Native GUI stack. default-features = false so we do NOT pull openssl or
# optional accesskit/ime/wgpu extras. `glow` keeps us on an OpenGL backend
# that ships with mesa on any Wayland/X11 distro. `persistence` gives us
# window-size + last-open-pane save via eframe's built-in ron-backed storage.
eframe       = { version = "0.29", default-features = false, features = ["glow", "default_fonts", "persistence"] }
egui         = "0.29"

[dev-dependencies]
tempfile = "3"
