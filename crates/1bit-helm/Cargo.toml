[package]
name         = "onebit-helm"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
repository.workspace   = true
authors.workspace      = true
description  = "1bit-helm — native Rust (egui/eframe) desktop client for 1bit-server. Formerly halo-gaia; renamed 2026-04-20 to avoid clash with AMD GAIA."

[lib]
name = "onebit_helm"
path = "src/lib.rs"
[[bin]]
name = "1bit-helm"
path = "src/main.rs"
# MVP Plasma SNI tray — start/stop/status over `systemctl --user`.
# Lives beside the egui window; they do not share a process. See
# `src/tray.rs` + `src/bin/tray.rs`. Gap P1 #7 (memory:
# project_helm_tray_icon).
[[bin]]
name = "1bit-halo-helm-tray"
path = "src/bin/tray.rs"
[dependencies]
anyhow       = { workspace = true }
reqwest      = { workspace = true }
serde        = { workspace = true }
serde_json   = { workspace = true }
tokio        = { workspace = true }
futures      = { workspace = true }
async-stream = { workspace = true }
dirs         = { workspace = true }
tracing      = { workspace = true }
# Bearer-token storage. keyring 3.x uses secret-service on Linux via zbus
# (pure Rust — no openssl, no libsecret C dep). If secret-service is not
# reachable at runtime (headless server, missing gnome-keyring) we fall
# back to `~/.config/1bit-helm/bearer.txt` (chmod 0600). See
# `bearer::Bearer`.
keyring      = { version = "3", default-features = false, features = ["sync-secret-service", "crypto-rust"] }
# Native GUI stack. default-features = false so we do NOT pull openssl or
# optional accesskit/ime/wgpu extras. `glow` keeps us on an OpenGL backend
# that ships with mesa on any Wayland/X11 distro. `persistence` gives us
# window-size + last-open-pane save via eframe's built-in ron-backed storage.
eframe       = { version = "0.29", default-features = false, features = ["glow", "default_fonts", "persistence"] }
egui         = "0.29"
# Plasma / KDE StatusNotifierItem tray icon. Pure-Rust zbus backend, no
# C deps. Only consumed by the `1bit-halo-helm-tray` binary — the
# eframe side never touches it. See `src/tray.rs`.
ksni         = "0.3"
[dev-dependencies]
tempfile = "3"
