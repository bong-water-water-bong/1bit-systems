[package]
name         = "onebit-watchdog"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
repository.workspace   = true
authors.workspace      = true
description  = "1bit-watchdog — 24h soak upstream tracker for the 1bit-systems C++ media stack. Polls GitHub + HuggingFace hourly, dwells 24h on new commits/releases, then triggers fork-merge + rebuild + redeploy. Discord notification on every transition."

[[bin]]
name = "1bit-watchdog"
path = "src/main.rs"

[dependencies]
clap              = { workspace = true }
serde             = { workspace = true }
serde_json        = { workspace = true }
toml              = { workspace = true }
anyhow            = { workspace = true }
thiserror         = { workspace = true }
tracing           = { workspace = true }
tracing-subscriber = { workspace = true }
reqwest           = { workspace = true }
tokio             = { workspace = true }
chrono            = { version = "0.4", features = ["serde"] }

[dev-dependencies]
tempfile = "3"
