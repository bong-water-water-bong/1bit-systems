[package]
name         = "onebit-router"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
repository.workspace   = true
authors.workspace      = true
description  = "1bit-router — backend dispatcher (picks 1bit-hip vs 1bit-mlx)"

[lib]
name = "onebit_router"
path = "src/lib.rs"

[features]
# Default: the router compiles without linking any GPU kernels (CI / check
# friendly). Turn on `hip` to link 1bit-hip's rocm-cpp kernels.
default         = []
hip             = ["onebit-hip/link-rocm"]
# BitNet v2 H-BitLinear — online Walsh-Hadamard rotation on the pre-quant
# activation stream at every ternary GEMV site. Off by default because
# (a) rotated weights (`W' = W @ H^T`) have to be baked offline by the
# requantizer and no shipping checkpoint carries them yet, and (b) even
# with the flag on, the forward pass only dispatches the rotation when
# the loaded .h1b sets `H1B_FLAG_HADAMARD_ROTATED`. Dev/test path; flip
# this on per-build once the rotated 2B-4T variant lands on disk.
bitnet-v2       = []

[dependencies]
anyhow  = { workspace = true }
tokio   = { workspace = true }
tracing = { workspace = true }
thiserror = { workspace = true }
futures   = { workspace = true }
async-stream = { workspace = true }
tokio-stream = { workspace = true }
half      = { workspace = true }
# Rayon is the CPU lane's thread pool — see `src/sampler/`. Pinned to
# the 1.x family; rayon is transitively present in the workspace already
# (via tokenizers + hf-tokenizers in other crates) so adding it here
# doesn't grow the build graph. Not a workspace dep today — if another
# crate needs it we'll promote it then.
rayon     = "1"
# Flume is the bounded-channel primitive used to hand logits buffers from
# the GPU dispatch thread to the CPU sampler worker in
# [`sampler::cpu::CpuSampler`]. Chose flume over tokio::sync::oneshot
# because the sampler handoff happens inside the `spawn_blocking` loop
# that drives `forward_token`, which isn't a tokio runtime context —
# flume's blocking sender/receiver pair works directly there. Tiny dep
# (~200 LOC, no transitive fanout beyond spin + pin-project-lite, both
# already in the graph via axum/tokio).
flume     = "0.11"
# mmap-backed read of the `.h1b-medusa` speculative-head file. Workspace dep
# (already used by `1bit-core` for the main `.h1b` loader). Same safety story:
# read-only map, model files are treated as immutable by contract.
memmap2   = { workspace = true }
# Zero-copy `&[u8]` → `&[u16]` cast for the fp16 tensor views inside
# `src/medusa/loader.rs`. `bytemuck::cast_slice` is the canonical safe
# reinterpret that checks alignment + length at runtime. Small crate
# (~1 KLOC, zero transitive deps). Only the `1` feature-set is needed — no
# derive, no zeroable-maybeuninit.
bytemuck  = "1"

onebit-core        = { workspace = true }
onebit-hip  = { path = "../1bit-hip", default-features = false }

[dev-dependencies]
# Used by `cpu_lane::tests` parity tests to build deterministic 32k-element
# logit vectors. `fastrand` is already a workspace dep (onebit-core uses
# it for the sampler RNG), so listing it here doesn't grow the build graph.
fastrand = { workspace = true }
# `src/medusa/loader.rs` synthesizes a `.h1b-medusa` file in a tempdir to
# exercise the parser end-to-end. Every other crate in the workspace that
# needs a temp path uses `tempfile = "3"`, so we match the pin.
tempfile = "3"
