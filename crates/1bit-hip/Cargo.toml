[package]
name         = "onebit-hip"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
repository.workspace   = true
authors.workspace      = true
description  = "FFI bridge from Rust to rocm-cpp's HIP ternary BitNet kernels (gfx1151)."
# `links = "rocm_cpp"` tells cargo this crate owns the `rocm_cpp` native
# library linkage — enables propagation of `cargo:KEY=VALUE` metadata
# (e.g. `rocm_cpp_lib_dir`) as `DEP_ROCM_CPP_KEY` env vars to direct
# downstream build.rs scripts (lemond at /home/bcloud/repos/lemonade/ and friends).
links = "rocm_cpp"

[lib]
name = "onebit_hip"
path = "src/lib.rs"

[features]
# Default: NO link against rocm (safe for CI / hosts without ROCm). Callers
# that want real kernels enable `link-rocm` via lemond's `real-backend`
# feature. Local dev builds can flip with
# `cargo build -p 1bit-hip --features link-rocm`.
default      = []
link-rocm    = []

[dependencies]
thiserror    = { workspace = true }

[dev-dependencies]
# libloading is used only in the smoke test to dlopen the .so by path and
# resolve one symbol. Keeps the test independent of whether the build-time
# linker found the library.
libloading   = "0.8"
# `half` is used by the `hadamard_rotate_inverse_identity` #[ignore] test
# that exercises the Hadamard rotation round-trip on real fp16 device
# memory. Already a workspace dep (1bit-core uses it); listing here lets
# the lib-test target compile even when --features link-rocm is off.
half         = { workspace = true }
