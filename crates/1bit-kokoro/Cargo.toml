[package]
# Cargo package names cannot start with a digit. The filesystem / bin name
# keeps the `1bit-kokoro` brand; the package / crate identifier is the
# underscore form.
name         = "onebit-kokoro"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
repository.workspace   = true
authors.workspace      = true
description  = "1bit-kokoro — FFI + safe Rust synth surface over kokoro.cpp (single-header C++ TTS)."

[lib]
name = "onebit_kokoro"
path = "src/lib.rs"

[[bin]]
name = "1bit-kokoro"
path = "src/main.rs"

[features]
# `stub` (default) keeps the crate pure-Rust: no C shim compiled, no link
# against libkokoro / onnxruntime. Every engine method returns
# `KokoroError::UnsupportedStub`. CI hosts without kokoro.cpp installed
# stay green.
#
# `real-kokoro` flips on the build.rs shim compile + the onnxruntime link
# step and swaps the stub for the libkokoro-backed implementation.
default      = ["stub"]
stub         = []
real-kokoro  = []

# Signals to build.rs + downstream services that the system onnxruntime
# was compiled with Vulkan backend enabled. Pure metadata today — the
# kokoro.cpp upstream picks backend at its own build time. Kept for parity
# with 1bit-whisper's `vulkan` flag so service-side config reads uniformly.
vulkan       = ["real-kokoro"]
# Analogous signal for an OpenVINO-enabled onnxruntime. Used on Intel
# hosts (sliger Arc B580 / Xe2 path) where OVEP accelerates the kokoro
# ONNX graph. Pure metadata; the actual backend is selected at
# onnxruntime build time.
openvino     = ["real-kokoro"]

[dependencies]
anyhow     = { workspace = true }
bytes      = { workspace = true }
tokio      = { workspace = true }
tracing    = { workspace = true }
serde      = { workspace = true }

[build-dependencies]
cc = "1.2"

[dev-dependencies]
serde_json = { workspace = true }
