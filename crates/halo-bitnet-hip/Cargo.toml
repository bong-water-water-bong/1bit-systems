[package]
name         = "halo-bitnet-hip"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
repository.workspace   = true
authors.workspace      = true
description  = "FFI bridge from Rust to rocm-cpp's HIP ternary BitNet kernels (gfx1151)."
# `links = "rocm_cpp"` tells cargo this crate owns the `rocm_cpp` native
# library linkage — enables propagation of `cargo:KEY=VALUE` metadata
# (e.g. `rocm_cpp_lib_dir`) as `DEP_ROCM_CPP_KEY` env vars to direct
# downstream build.rs scripts (halo-server, halo-router).
links = "rocm_cpp"

[lib]
path = "src/lib.rs"

[features]
# Default: NO link against rocm (safe for CI / hosts without ROCm). Callers
# that want real kernels enable `link-rocm` via halo-router's `hip` feature
# or halo-server's `real-backend` feature. Local dev builds can flip with
# `cargo build -p halo-bitnet-hip --features link-rocm`.
default      = []
link-rocm    = []

[dependencies]
thiserror    = { workspace = true }

[dev-dependencies]
# libloading is used only in the smoke test to dlopen the .so by path and
# resolve one symbol. Keeps the test independent of whether the build-time
# linker found the library.
libloading   = "0.8"
